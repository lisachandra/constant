packages:
  - 'packages/*'
  - 'test/*'

autoInstallPeers: true

catalog:
  "@changesets/changelog-github": 0.6.0
  "@changesets/cli": 2.31.0
  "@isentinel/jest-roblox": 0.2.7
  '@isentinel/tsconfig': 1.2.0
  "@lisachandra/types": "github:lisachandra/rbxts#path:packages/types"
  "@lisachandra/core": "github:lisachandra/rbxts#path:packages/core"
  "@rbxts/compiler-types": latest
  "@rbxts/jest": 3.13.3-ts.1
  "@rbxts/jest-globals": 3.13.3-ts.1
  "@rbxts/services": latest
  "@rbxts/types": latest
  "@rbxts/iris": 2.3.1-ts.1
  husky: 9.1.7
  io-serve: 1.1.2
  roblox-ts: 3.0.0
  shx: 0.4.0
  typescript: =5.5.3
  jiti: 2.6.1
catalogMode: prefer
cleanupUnusedCatalogs: true

configDependencies:
  "@pnpm/plugin-trusted-deps": 0.2.0+sha512-jqiCC8kyrwOERwMWPo2RB1YlDMMS5WsPSA8Uwi3EXAYwyOSNtqKhrB9bs543JGUiz4yaA9h6nE3q98fG14AEyQ==
ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - unrs-resolver
  - "@lisachandra/types"
  - "@lisachandra/core"
saveExact: true
shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - eslint-config-prettier@9.1.2
  - semver@5.7.2
  - chokidar@4.0.3
